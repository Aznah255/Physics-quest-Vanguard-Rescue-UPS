<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Physics Quest: Vanguard Rescue UPS Edition</title>
<style>:root{
  --bg:#070B2E;
  --card:#111A44;
  --card2:#17215A;
  --line:rgba(151,160,255,.38);
  --accent:#00E5FF;
  --accent2:#B56BFF;
  --pink:#FF5FD2;
  --gold:#FFD54A;
  --good:#35F2A0;
  --bad:#FF5A7A;
  --text:#F8FBFF;
  --muted:#D5DCFF;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 12% 12%,rgba(255,95,210,.34) 0,transparent 28%),
    radial-gradient(circle at 86% 18%,rgba(0,229,255,.34) 0,transparent 30%),
    radial-gradient(circle at 65% 88%,rgba(255,213,74,.20) 0,transparent 36%),
    linear-gradient(135deg,#070B2E 0%,#10124B 42%,#280D4D 74%,#050716 100%);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(120deg,transparent 0 35%,rgba(255,255,255,.06) 45%,transparent 55% 100%),
    radial-gradient(ellipse at 50% 0%,rgba(181,107,255,.25),transparent 55%);
  mix-blend-mode:screen;
  opacity:.75;
}
.stars{
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(white 1px,transparent 1px),
    radial-gradient(rgba(0,229,255,.9) 1px,transparent 1px),
    radial-gradient(rgba(255,213,74,.9) 1px,transparent 1px);
  background-size:48px 48px,90px 90px,130px 130px;
  background-position:0 0,20px 30px,70px 80px;
  opacity:.22;
  animation:move 60s linear infinite;
  pointer-events:none;
}
@keyframes move{to{background-position:1000px 600px,1020px 630px,1070px 680px}}
.wrap{max-width:980px;margin:auto;padding:22px;position:relative;z-index:1}
.card{
  background:linear-gradient(180deg,rgba(25,35,96,.92),rgba(10,15,48,.94));
  border:1px solid var(--line);
  border-radius:26px;
  box-shadow:0 22px 75px rgba(0,0,0,.38),0 0 0 1px rgba(255,255,255,.04) inset,0 0 35px rgba(0,229,255,.08);
  padding:24px;
  margin:18px 0;
  backdrop-filter:blur(10px);
}
h1{
  font-size:clamp(2.2rem,5vw,4.2rem);
  margin:10px 0;
  color:#fff;
  text-shadow:0 0 16px rgba(0,229,255,.45),0 0 28px rgba(255,95,210,.25),3px 3px 8px rgba(0,0,0,.55);
}
h2{margin-top:0;color:var(--accent);text-shadow:0 0 14px rgba(0,229,255,.42)}
.muted{color:var(--muted)}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
button{
  border:0;
  border-radius:18px;
  padding:13px 18px;
  background:linear-gradient(135deg,#00E5FF 0%,#35F2A0 52%,#FFD54A 100%);
  color:#061126;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 10px 28px rgba(0,229,255,.26),0 0 0 1px rgba(255,255,255,.28) inset;
  transition:transform .15s ease,filter .15s ease,box-shadow .15s ease;
}
button.secondary{
  background:linear-gradient(135deg,rgba(181,107,255,.28),rgba(0,229,255,.14));
  color:white;
  border:1px solid rgba(151,160,255,.42);
  box-shadow:0 8px 24px rgba(0,0,0,.22),0 0 18px rgba(181,107,255,.12) inset;
}
button:hover{transform:translateY(-2px);filter:saturate(1.15);box-shadow:0 13px 30px rgba(255,95,210,.22),0 10px 28px rgba(0,229,255,.22)}
.mission-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.mission{
  padding:18px;
  border-radius:22px;
  border:1px solid rgba(151,160,255,.34);
  background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(0,229,255,.04));
  cursor:pointer;
  box-shadow:0 12px 32px rgba(0,0,0,.18);
}
.mission:hover{outline:2px solid var(--accent);box-shadow:0 0 28px rgba(0,229,255,.22),0 0 22px rgba(255,95,210,.16)}
.locked{opacity:.45;pointer-events:none}
.badge{
  display:inline-block;
  background:linear-gradient(135deg,rgba(0,229,255,.18),rgba(255,95,210,.14));
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
  padding:6px 10px;
  margin:4px;
  color:#ECF5FF;
  box-shadow:0 0 14px rgba(0,229,255,.08) inset;
}
.meter{height:18px;background:#111843;border-radius:99px;overflow:hidden;border:1px solid rgba(151,160,255,.35)}
.bar{height:100%;background:linear-gradient(90deg,#35F2A0,#00E5FF,#FFD54A);width:0%;box-shadow:0 0 18px rgba(0,229,255,.45)}
.figure{max-width:100%;border-radius:18px;background:white;padding:8px;margin:12px auto;display:block;max-height:440px;object-fit:contain;box-shadow:0 12px 35px rgba(0,0,0,.26),0 0 0 3px rgba(255,213,74,.18)}
.answers{display:grid;gap:12px;margin-top:18px}
.answer{
  text-align:left;
  background:linear-gradient(135deg,rgba(28,39,105,.96),rgba(18,27,75,.96));
  color:white;
  border:1px solid rgba(151,160,255,.36);
  border-radius:18px;
  padding:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.18);
}
.answer:hover{border-color:var(--accent);box-shadow:0 0 22px rgba(0,229,255,.16)}
.answer.correct{border-color:var(--good);background:linear-gradient(135deg,rgba(53,242,160,.22),rgba(0,229,255,.10))}
.answer.wrong{border-color:var(--bad);background:linear-gradient(135deg,rgba(255,90,122,.22),rgba(255,95,210,.09))}
.feedback{padding:16px;border-radius:18px;margin-top:16px;border:1px solid rgba(151,160,255,.38);background:rgba(255,255,255,.07);box-shadow:0 10px 26px rgba(0,0,0,.18)}
.rescue{border-color:var(--gold);background:linear-gradient(135deg,rgba(255,213,74,.18),rgba(255,95,210,.08));box-shadow:0 0 22px rgba(255,213,74,.13)}
.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
.small{font-size:.92rem}.center{text-align:center}
.avatar{font-size:4rem;filter:drop-shadow(0 0 16px #00E5FF) drop-shadow(0 0 22px rgba(255,95,210,.4))}
.speech{border-left:4px solid var(--accent);padding-left:14px;color:#F2F7FF;background:rgba(0,229,255,.05);border-radius:0 14px 14px 0}
.certificate{background:radial-gradient(circle at 30% 20%,#1d2a68 0,#070b1d 45%,#02040c 100%);color:#f5f7ff;border:8px double #FFD700;box-shadow:0 0 40px rgba(255,215,0,.25)}
.hero-banner{background:rgba(0,0,0,.52);padding:18px 32px;border-radius:24px;display:inline-block;margin-bottom:14px;backdrop-filter:blur(6px);border:1px solid rgba(255,215,0,.35)}
.hero-title{font-size:clamp(2.4rem,6vw,4.6rem);font-weight:900;color:#FFD700;text-transform:uppercase;letter-spacing:4px;text-shadow:0 0 8px rgba(255,215,0,.9),0 0 18px rgba(255,215,0,.75),0 0 30px rgba(255,215,0,.45),3px 3px 8px rgba(0,0,0,.95);margin:0}
.cert-name{color:#ffffff;text-shadow:2px 2px 6px rgba(0,0,0,.9);font-size:clamp(1.8rem,4vw,2.8rem)}
.certificate .badge{background:rgba(255,255,255,.12);border-color:rgba(255,215,0,.65);color:#fff7d6}.certificate p{color:#eef3ff;text-shadow:1px 1px 4px rgba(0,0,0,.8)}
.audio-panel{position:fixed;right:14px;bottom:14px;z-index:20;background:rgba(7,11,46,.78);border:1px solid rgba(0,229,255,.35);border-radius:18px;padding:10px 12px;box-shadow:0 10px 35px rgba(0,0,0,.35),0 0 20px rgba(0,229,255,.11);backdrop-filter:blur(8px);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.audio-panel button{padding:8px 10px;border-radius:12px;font-size:.85rem}.audio-panel input{width:90px;accent-color:#00E5FF}.audio-label{font-size:.78rem;color:#dfe8ff}
@media(max-width:600px){.wrap{padding:12px}.card{padding:16px}button{width:100%}.audio-panel{left:10px;right:10px;justify-content:center}.audio-panel button{width:auto}}</style></head><body><div class="stars"></div><main class="wrap"><div id="app"></div></main><div id="audioPanel" class="audio-panel"></div>

t provides the force needed to stop your body during sudden braking."}}, {"id": "q2", "bloom": "C2", "text": "The hockey puck is moving at a constant velocity across the ice. What forces does the puck experience at this moment?", "answers": [{"text": "Gravity, Normal, Friction, and Applied", "isCorrect": false, "feedback": "An applied force is not needed to keep constant velocity. At this moment, the puck is already moving."}, {"text": "Gravity", "isCorrect": false, "feedback": "Gravity acts downward, but the ice also exerts an upward normal force."}, {"text": "Gravity and Normal", "isCorrect": true, "feedback": "Correct. With constant velocity on smooth ice, the vertical forces are weight and normal force. The resultant force is zero."}, {"text": "Gravity, Normal, and Friction", "isCorrect": false, "feedback": "If friction were significant, it would slow the puck. Constant velocity suggests no resultant horizontal force."}], "rescue": {"rule": "Constant velocity means resultant force = 0.", "example": "A smooth puck can keep moving without a pushing force if friction is negligible."}}]}, {"id": 2, "title": "Mission 02", "subtitle": "Motion Control Lock", "topic": "Newton's 2nd & 3rd Laws", "icon": "⚙️", "brief": "The engine control system is asking about force, mass, acceleration, and action-reaction forces. Use Newton laws to restore motion control.", "questions": [{"id": "q3", "text": "If you double the mass of an object with the same force applied on it, the acceleration will...", "answers": [{"text": "cut in half", "isCorrect": true, "feedback": "Correct. From F = ma, a = F/m. If mass doubles and force stays the same, acceleration becomes half."}, {"text": "double", "isCorrect": false, "feedback": "Acceleration doubles only if force doubles while mass stays constant."}, {"text": "the same", "isCorrect": false, "feedback": "The same force must move a larger mass, so acceleration changes."}, {"text": "zero", "isCorrect": false, "feedback": "Acceleration becomes smaller, but not zero unless the net force is zero."}], "rescue": {"rule": "a = F/m. Acceleration is inversely proportional to mass.", "example": "A heavier trolley accelerates less than a lighter trolley when pushed with the same force."}}, {"id": "q4", "text": "The acceleration produced by a net force on an object is...", "answers": [{"text": "inversely proportional to the mass of the object", "isCorrect": false, "feedback": "This is true, but not the complete answer because acceleration also depends on net force and direction."}, {"text": "all statements are correct", "isCorrect": true, "feedback": "Correct. Acceleration is directly proportional to net force, inversely proportional to mass, and in the direction of the net force."}, {"text": "directly proportional to the magnitude of the net force", "isCorrect": false, "feedback": "This is true, but the question includes other correct statements too."}, {"text": "in the same direction as the net force", "isCorrect": false, "feedback": "This is true, but it is not the only correct statement."}], "rescue": {"rule": "Newton's 2nd Law: Fnet = ma.", "example": "More net force gives more acceleration; more mass gives less acceleration."}}, {"id": "q5", "text": "Figure shows a man jumping onto the jetty from a boat and the boat moves away. This situation is related to the concept of...", "image": "data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20900%20520%22%3E%0A%20%20%3Cdefs%3E%0A%20%20%20%20%3ClinearGradient%20id%3D%22sky%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%220%22%20y2%3D%221%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23eaf7ff%22/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23c7e8ff%22/%3E%0A%20%20%20%20%3C/linearGradient%3E%0A%20%20%20%20%3ClinearGradient%20id%3D%22water%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%220%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%22%20stop-color%3D%22%2 e to oppose slipping downward."}, {"text": "Diagram B", "isCorrect": false, "feedback": "This diagram shows friction down the plane, but a stationary box tends to slide down, so friction must act up the plane."}, {"text": "Diagram C", "isCorrect": false, "feedback": "It shows an applied force instead of friction. The question describes only a stationary box on an incline."}, {"text": "Diagram D", "isCorrect": false, "feedback": "Friction direction is wrong for a stationary box that tends to slide down the slope."}], "rescue": {"rule": "Stationary on incline: resultant force = 0; friction acts up the plane.", "example": "A parked car on a hill is held by friction acting up the slope."}}, {"id": "q7", "text": "A train rolls to a stop along a horizontal track without the conductor applying the brakes. What answer choice BEST explains why this occurred?", "answers": [{"text": "The natural state of the train is not to be in motion.", "isCorrect": false, "feedback": "Objects in motion can keep moving. The train stops because an opposing force acts on it."}, {"text": "The opposing force of friction stopped the train.", "isCorrect": true, "feedback": "Correct. Friction and resistance act opposite the train's motion and gradually stop it."}, {"text": "The train ran out of momentum.", "isCorrect": false, "feedback": "Momentum does not simply run out. It changes because an external force acts."}, {"text": "The force of gravity slowed the train until it stopped.", "isCorrect": false, "feedback": "On a horizontal track, gravity acts downward, not opposite the horizontal motion."}], "rescue": {"rule": "A moving object slows when an opposing resultant force acts on it.", "example": "Rolling wheels slow because of friction and air resistance."}}]}, {"id": 4, "title": "Mission 04", "subtitle": "Work Station", "topic": "Work", "icon": "🔧", "brief": "The repair bay needs the exact meaning of work in physics. Separate effort from scientific work.", "questions": [{"id": "q8", "text": "T let state={screen:'title',mission:0,q:0,completed:[],score:0,totalAnswered:0,wrong:0,muted:false,name:'Cadet',musicVol:.13};let audioCtx=null,bgMaster=null,bgNodes=[],musicTimer=null,currentMood='title',isSpeaking=false;
function esc(s){return String(s).replace(/'/g,"\\'").replace(/\n/g,' ')}
function initAudio(){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();if(!bgMaster){bgMaster=audioCtx.createGain();bgMaster.gain.value=0;bgMaster.connect(audioCtx.destination)}}catch(e){}}
const MOODS={title:{base:110,vol:.12,tempo:1250},map:{base:98,vol:.10,tempo:1500},story:{base:82,vol:.08,tempo:1800},challenge:{base:130.81,vol:.075,tempo:1400},complete:{base:196,vol:.12,tempo:1100},end:{base:146.83,vol:.11,tempo:1600}};
function moodKey(){if(state.screen==='end')return'end';if(state.screen==='complete')return'complete';if(state.screen==='challenge')return'challenge';if(state.screen==='story')return'story';if(state.screen==='map')return'map';return'title'}
function targetVol(){let m=MOODS[moodKey()]||MOODS.title;return state.muted?0:(isSpeaking?.035:Math.min(state.musicVol??m.vol,m.vol))}
function rampMusic(v){if(!bgMaster||!audioCtx)return;bgMaster.gain.cancelScheduledValues(audioCtx.currentTime);bgMaster.gain.linearRampToValueAtTime(v,audioCtx.currentTime+.45)}
function startMusic(){if(state.muted)return;initAudio();if(!audioCtx||bgNodes.length)return;const pad=audioCtx.createGain();pad.gain.value=.26;pad.connect(bgMaster);[1,1.5,2].forEach((mult,idx)=>{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type=idx===0?'sine':'triangle';o.frequency.value=(MOODS[moodKey()]||MOODS.title).base*mult;g.gain.value=idx===0?.14:.045;o.connect(g);g.connect(pad);o.start();bgNodes.push(o,g)});scheduleMusic();rampMusic(targetVol())}
function stopMusic(){if(musicTimer){clearInterval(musicTimer);musicTimer=null}bgNodes.forEach(n=>{try{n.stop&&n.stop()}catch(e){}try{n.disconnect&&n.disconnect()}catch(e){}});bgNodes=[];rampMusic(0)}
function scheduleMusic(){if(musicTimer)clearInterval(musicTimer);const notes=[1,1.25,1.5,2,1.5,1.25];let step=0;musicTimer=setInterval(()=>{if(state.muted||!audioCtx||isSpeaking)return;const m=MOODS[moodKey()]||MOODS.title;const o=audioCtx.createOscillator(),g=audioCtx.createGain(),d=audioCtx.createDelay();o.type='sine';o.frequency.value=m.base*notes[step++%notes.length]*2;g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.045,audioCtx.currentTime+.04);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+1.1);d.delayTime.value=.22;o.connect(g);g.connect(bgMaster);g.connect(d);d.connect(bgMaster);o.start();o.stop(audioCtx.currentTime+1.2)},(MOODS[moodKey()]||MOODS.title).tempo)}
function syncAudio(){if(state.muted){stopMusic();return}initAudio();if(!bgNodes.length)startMusic();const mk=moodKey();if(mk!==currentMood){currentMood=mk;if(bgNodes[0]){const m=MOODS[mk]||MOODS.title;[1,1.5,2].forEach((mult,idx)=>{let o=bgNodes[idx*2];try{o.frequency.linearRampToValueAtTime(m.base*mult,audioCtx.currentTime+1.2)}catch(e){}});scheduleMusic()}}rampMusic(targetVol())}
function updateAudioPanel(){const p=document.getElementById('audioPanel');if(!p)return;p.innerHTML=`<button onclick="toggleSound()">${state.muted?'🔇 Sound Off':'🔊 Sound On'}</button><span class="audio-label">Music</span><input type="range" min="0" max="20" value="${Math.round((state.musicVol||.13)*100)}" oninput="setMusicVolume(this.value)"><button onclick="replayCurrentARIA()">🤖 Replay</button>`}
function toggleSound(){state.muted=!state.muted;if(!state.muted)startMusic();else stopMusic();updateAudioPanel();render()}
function setMusicVolume(v){state.musicVol=Math.max(0,Math.min(.2,Number(v)/100));syncAudio()}
function replayCurrentARIA(){try{if(state.screen==='story')speak(MISSIONS[state.mission].brief);else if(state.screen==='challenge')speak(MISSIONS[state.mission].questions[state.q].text);else if(state.screen==='end')speak('Congratulations. You are a Physics Vanguard Hero.')}catch(e){}}
function beep(freq=440,dur=.12,type='sine'){if(state.muted)return;try{initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=freq;o.type=type;o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(.035,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}}
function speak(txt){if(state.muted||!('speechSynthesis'in window))return;initAudio();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.rate=.92;u.pitch=.75;u.volume=1;u.onstart=()=>{isSpeaking=true;syncAudio()};u.onend=()=>{isSpeaking=false;syncAudio()};u.onerror=()=>{isSpeaking=false;syncAudio()};speechSynthesis.speak(u)}
function el(h){document.getElementById('app').innerHTML=h}function pct(){return Math.round((state.completed.length/MISSIONS.length)*100)}function render(){let r;if(state.screen==='title')r=title();else if(state.screen==='map')r=map();else if(state.screen==='story')r=story();else if(state.screen==='challenge')r=challenge();else if(state.screen==='complete')r=missionComplete();else if(state.screen==='end')r=end();syncAudio();updateAudioPanel();return r}
function title(){el(`<section class="card center"><div class="avatar">🚀</div><h1>Physics Quest</h1><h2>Vanguard Rescue: UPS Edition</h2><p class="muted">Adventure quiz game based on MOCK 3 UPS 2 PHYSICS DP014 questions.</p><input id="nm" placeholder="Student name / class" style="padding:13px;border-radius:14px;border:1px solid #3a4c87;background:#10183a;color:white;max-width:340px;width:100%;margin:10px"/><div class="row" style="justify-content:center"><button onclick="startGame()">Start Mission</button><button class="secondary" onclick="toggleSound()">${state.muted?'🔇 Sound Off':'🔊 Sound On'}</button></div><p class="small muted">Click Start first to enable ARIA voice and adventure sounds.</p></section>`)}
function startGame(){state.name=document.getElementById('nm').value||'Cadet';initAudio();startMusic();beep(523,.12);state.screen='map';render()}
function map(){let cards=MISSIONS.map((m,i)=>{const done=state.completed.includes(i),unlock=i===0||state.completed.includes(i-1);return `<div class="mission ${unlock?'':'locked'}" onclick="selectMission(${i})"><div style="font-size:2rem">${m.icon}</div><h3>${m.title}: ${m.subtitle}</h3><p class="muted small">${m.topic}</p><span class="badge">${done?'Completed ✅':'Ready'}</span></div>`}).join('');el(`<div class="topbar"><h2>Mission Map</h2><button class="secondary" onclick="toggleSound()">${state.muted?'🔇':'🔊'}</button></div><div class="card"><p>Welcome, <b>${state.name}</b>. Complete each mission to unlock the final launch.</p><div class="meter"><div class="bar" style="width:${pct()}%"></div></div><p class="small muted">Progress: ${pct()}%</p></div><div class="mission-grid">${cards}</div>`)}
function selectMission(i){state.mission=i;state.q=0;state.wrong=0;state.screen='story';beep(392,.12);render()}
function story(){const m=MISSIONS[state.mission];el(`<section class="card"><div class="avatar">🤖</div><h2>${m.title}: ${m.subtitle}</h2><p class="speech">${m.brief}</p><div class="row"><button onclick="speak('${esc(m.brief)}')">🤖 Play ARIA Briefing</button><button onclick="state.screen='challenge';render()">Continue to Challenge</button><button class="secondary" onclick="state.screen='map';render()">Back to Map</button></div></section>`);speak(m.brief)}
function challenge(){const m=MISSIONS[state.mission],q=m.questions[state.q];const answers=q.answers.map((a,i)=>`<button class="answer" id="ans${i}" onclick="answer(${i})"><b>${String.fromCharCode(65+i)}.</b> ${a.text}</button>`).join('');el(`<div class="topbar"><span class="badge">${m.title} • Question ${state.q+1}/${m.questions.length}</span><button class="secondary" onclick="state.screen='map';render()">Exit</button></div><section class="card"><h2>${q.text}</h2>${q.image?`<img class="figure" src="${q.image}" alt="Question figure">`:''}<p class="muted small">Bloom level: ${q.bloom||'C1/C2'}</p><div class="answers">${answers}</div><div id="fb"></div></section>`);speak(q.text)}
function answer(i){
  const m=MISSIONS[state.mission],q=m.questions[state.q],a=q.answers[i];
  let fb=document.getElementById('fb');

  // If the learner selects the correct answer, reveal it immediately and continue.
  if(a.isCorrect){
    document.querySelectorAll('.answer').forEach((b,idx)=>{
      b.disabled=true;
      if(idx===i)b.classList.add('correct');
    });
    state.totalAnswered++;
    state.score++;
    state.wrong=0;
    beep(660,.16,'triangle');
    fb.innerHTML=`<div class="feedback"><h3>✅ Correct, Cadet!</h3><p>${a.feedback}</p><p><b>Key rule:</b> ${q.rescue.rule}</p><div class="row"><button onclick="nextQ()">Continue</button></div></div>`;
    speak('Correct. '+a.feedback);
    return;
  }

  // Wrong-answer logic: first wrong attempt gives feedback only; correct answer stays hidden.
  // The correct answer appears only after the second wrong attempt for this question.
  state.totalAnswered++;
  state.wrong++;
  const revealCorrect = state.wrong>=2;
  beep(180,.18,'sawtooth');

  document.querySelectorAll('.answer').forEach((b,idx)=>{
    if(idx===i)b.classList.add('wrong');
    if(revealCorrect){
      b.disabled=true;
      if(q.answers[idx].isCorrect)b.classList.add('correct');
    }else{
      // Only the selected wrong option is disabled; students may try again.
      if(idx===i)b.disabled=true;
    }
  });

  if(revealCorrect){
    const correctAnswer=q.answers.find(ans=>ans.isCorrect)?.text||'the correct answer';
    fb.innerHTML=`<div class="feedback"><h3>❌ Second attempt reached.</h3><p>${a.feedback}</p><p><b>Correct answer:</b> ${correctAnswer}</p><div class="feedback rescue"><h3>🟡 ARIA Rescue Card</h3><p><b>Rule:</b> ${q.rescue.rule}</p><p><b>Example:</b> ${q.rescue.example}</p></div><div class="row"><button onclick="nextQ()">Continue</button></div></div>`;
    speak('Second attempt reached. The correct answer is '+correctAnswer+'. '+q.rescue.rule);
  }else{
    fb.innerHTML=`<div class="feedback"><h3>❌ Not quite. Try one more time.</h3><p>${a.feedback}</p><p class="muted small">ARIA will reveal the correct answer only after the second wrong attempt.</p><div class="row"><button onclick="retryQ()">Try Again</button></div></div>`;
    speak('Not quite. Try one more time. '+a.feedback);
  }
}
function retryQ(){challenge()}function nextQ(){const m=MISSIONS[state.mission];state.wrong=0;if(state.q+1<m.questions.length){state.q++;challenge()}else{if(!state.completed.includes(state.mission))state.completed.push(state.mission);state.screen='complete';render()}}
function badgeName(i){return ['Inertia Guardian','Motion Specialist','Force Analyst','Work Engineer','Energy Reactor Expert','Vanguard Hero'][i]}
function missionComplete(){const m=MISSIONS[state.mission],final=state.mission===MISSIONS.length-1;el(`<section class="card center"><div class="avatar">🏅</div><h2>${m.subtitle} Complete!</h2><p>Badge earned: <span class="badge">${badgeName(state.mission)}</span></p><p class="muted">ARIA: Excellent progress, ${state.name}.</p><button onclick="${final?"state.screen='end'":"state.screen='map'"};render()">${final?'View Certificate':'Return to Map'}</button></section>`);beep(784,.2,'triangle')}
function end(){const acc=state.totalAnswered?Math.round(100*state.score/state.totalAnswered):0;el(`<section class="card certificate center"><div class="hero-banner"><h1 class="hero-title">Physics Vanguard Hero</h1></div><h2 class="cert-name">${state.name}</h2><p>has completed <b>Physics Quest: Vanguard Rescue UPS Edition</b></p><p>Score record: <b>${state.score}/${state.totalAnswered}</b> correct attempts (${acc}%)</p><p>Badges earned: ${MISSIONS.map((_,i)=>`<span class="badge">${badgeName(i)}</span>`).join('')}</p><button onclick="window.print()">Print Certificate</button><button onclick="state={screen:'title',mission:0,q:0,completed:[],score:0,totalAnswered:0,wrong:0,muted:false,name:'Cadet',musicVol:state.musicVol||.13};render()">Restart Game</button></section>`);speak('Congratulations. You are a Physics Vanguard Hero.')}
render();
</script></body></html>
